# =============================================================
# SmolVLA Fine-tuning Config for SO-101 Cup Handover
# =============================================================
# Usage (Colab T4):
#   python -m lerobot.scripts.train --config configs/smolvla_train.yaml
#
# If OOM, switch to LoRA config below or reduce batch_size to 8.
# =============================================================

# ---- Model ----
policy:
  path: lerobot/smolvla_base
  use_amp: true  # CRITICAL: T4 only supports float16, not bfloat16

# ---- Dataset ----
dataset:
  repo_id: YOUR_HF_USER/so101_cup_handover  # <-- Change this!
  # single_task is set during recording, no need to repeat here

# ---- Training ----
batch_size: 16          # Safe for T4 16GB; try 32 if no OOM
steps: 20000            # ~8-12 hours on T4
save_freq: 2000         # Save checkpoint every 2000 steps
output_dir: /content/drive/MyDrive/smolvla_cup  # Google Drive path

# ---- Logging ----
wandb:
  enable: false  # Set true if you have wandb configured

# ---- Resume ----
# Uncomment to resume from latest checkpoint:
# resume: true

# =============================================================
# LoRA Alternative (uncomment if full fine-tune causes OOM)
# =============================================================
# peft:
#   method_type: LORA
#   r: 64
#   lora_alpha: 16
#
# policy:
#   optimizer_lr: 1e-3    # 10x higher LR for LoRA
#
# batch_size: 32          # LoRA uses less VRAM, can go higher
